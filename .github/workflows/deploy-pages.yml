name: Publish catalog to Pages
# Deploys whatever is currently in data/ + mcp_server/site_index.html to
# GitHub Pages. Triggered on any push to main that touches those files, so
# locally-built or manually-edited catalogs go live without re-scraping.
on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'mcp_server/site_index.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static site from committed data
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -e
          mkdir -p _site
          cp data/products.json data/categories.json _site/
          python - <<'PY'
          import json, os, datetime, pathlib, collections
          rows = json.load(open('data/products.json', encoding='utf-8'))
          sources = collections.Counter(r.get('source') or 'unknown' for r in rows)
          manifest = {
              "count": len(rows),
              "updated_at": datetime.datetime.utcnow().isoformat() + "Z",
              "owner": os.environ["REPO_OWNER"],
              "repo": os.environ["REPO_NAME"],
              "sources": dict(sources),
          }
          pathlib.Path('_site/manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
          PY
          sed -e "s|__OWNER__|${REPO_OWNER}|g" \
              -e "s|__REPO__|${REPO_NAME}|g" \
              mcp_server/site_index.html > _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
