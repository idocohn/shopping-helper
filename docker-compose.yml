services:
  api:
    build: .
    ports: ["8000:8000"]
    volumes: ["./data:/app/data"]
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports: ["5173:5173"]
    volumes: ["./webapp:/app"]
    environment:
      VITE_API_URL: http://localhost:8000
